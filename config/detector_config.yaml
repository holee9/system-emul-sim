# X-ray Detector Panel Configuration
# Single source of truth for all target-specific configurations
# Schema: config/schema/detector-config-schema.json

panel:
  rows: 2048
  cols: 2048
  pixel_pitch_um: 150
  bit_depth: 16

fpga:
  timing:
    gate_on_us: 10.0
    gate_off_us: 5.0
    roic_settle_us: 1.0
    adc_conv_us: 2.0

  line_buffer:
    depth_lines: 2
    bram_width_bits: 16

  data_interface:
    primary: csi2
    csi2:
      lane_count: 4
      data_type: RAW16
      virtual_channel: 0
      lane_speed_mbps: 400
      line_blanking_clocks: 100
      frame_blanking_lines: 10

  spi:
    clock_hz: 50000000
    mode: 0
    word_size_bits: 32

  protection:
    timeout_ms: 100
    overexposure_threshold: 60000
    overflow_action: stop

controller:
  platform: imx8mp
  ethernet:
    speed: 10gbe
    protocol: udp
    port: 8000
    mtu: 9000
    payload_size: 8192

  frame_buffer:
    count: 4
    allocation_mb: 128

  csi2_rx:
    interface_index: 0
    dma_burst_length: 256

host:
  storage:
    format: tiff
    path: ./frames
    compression: none
    auto_save: false

  display:
    fps: 15
    color_map: gray
    window_scale: 1.0

  network:
    receive_buffer_mb: 64
    receive_threads: 2
    packet_timeout_ms: 1000
